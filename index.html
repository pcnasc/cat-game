<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catch My Heart</title>
    <link rel="stylesheet" href="style.css?v=2" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="game-container">
      <div id="score-board">Score: <span id="score">0</span>/50</div>
      <div id="cat">🐱</div>

      <div id="start-overlay">
        <div class="message-box">
          <h1>Pegue a comida da Marie!! 🐾</h1>
          <p>Bah guria é só mover o mouse pra lá e pra cá</p>
          <button id="start-btn">BORA MEO 💖</button>
        </div>
      </div>

      <div id="message-overlay" class="hidden">
        <div class="message-box">
            <img id="cat-photo" src="her-cat.jpg" alt="[Please place 'her-cat.jpg' in the folder to see it here!]" />
          <h1>PEGOU TUDO, TRUE FRIEND 🎉</h1>
          <p>Agora tem mais ainda o coração da Marie e sempre terá o meu!🐾❤️</p>
          <div class="emoji-shower">💖🐱💖</div>
        </div>
      </div>
    </div>
    <script src="script.js?v=2"></script>
  </body>
</html>
