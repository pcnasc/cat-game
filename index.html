<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catch My Heart</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="game-container">
      <div id="score-board">Score: <span id="score">0</span>/30</div>
      <div id="cat">🐱</div>

      <div id="message-overlay" class="hidden">
        <div class="message-box">
            <img id="cat-photo" src="her-cat.jpg" alt="[Please place 'her-cat.jpg' in the folder to see it here!]" />
          <h1>You caught them all! 🎉</h1>
          <p>But you already caught my heart. 🐾❤️</p>
          <div class="emoji-shower">💖🐱💖</div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
